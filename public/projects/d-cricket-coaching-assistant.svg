<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0A0F"/>
      <stop offset="0.55" stop-color="#111118"/>
      <stop offset="1" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9A84C"/>
      <stop offset="1" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="420" cy="260" r="260" fill="#7B61FF" opacity="0.14"/>
  <circle cx="1210" cy="640" r="320" fill="#C9A84C" opacity="0.12"/>

  <g opacity="0.75" filter="url(#glow)">
    <path d="M260 600 C420 460 520 720 680 580 C840 440 940 520 1120 420"
      fill="none" stroke="url(#accent)" stroke-width="3"/>
  </g>

  <text x="90" y="180" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="56" fill="#F0EEF8">
    Cricket Coaching Assistant
  </text>
  <text x="90" y="240" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" fill="#6B6B8A">
    Python " YOLO " REST APIs " Computer Vision
  </text>

  <rect x="90" y="310" width="520" height="360" rx="26" fill="rgba(255,255,255,0.04)" stroke="rgba(30,30,46,0.9)"/>
  <text x="130" y="370" font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" fill="#F0EEF8" opacity="0.9">
    $ analyze --clip batting.mp4
  </text>
  <text x="130" y="410" font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" fill="#F0EEF8" opacity="0.85">
     stance detected
  </text>
  <text x="130" y="450" font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" fill="#F0EEF8" opacity="0.85">
     head position stable
  </text>
  <text x="130" y="490" font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" fill="#F0EEF8" opacity="0.85">
     bat swing path consistent
  </text>
  <text x="130" y="530" font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" fill="#C9A84C" opacity="0.95">
    ’ feedback: improve front-foot stride timing
  </text>
</svg>

