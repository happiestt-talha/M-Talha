<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0A0F"/>
      <stop offset="0.55" stop-color="#111118"/>
      <stop offset="1" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F0EEF8"/>
      <stop offset="0.45" stop-color="#C9A84C"/>
      <stop offset="1" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <circle cx="260" cy="160" r="190" fill="#7B61FF" opacity="0.12"/>
  <circle cx="980" cy="520" r="240" fill="#C9A84C" opacity="0.10"/>
  <path d="M0,520 C220,420 360,600 540,520 C720,440 860,460 1200,370 L1200,630 L0,630 Z"
        fill="#0A0A0F" opacity="0.7"/>

  <g filter="url(#glow)">
    <text x="90" y="280" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-weight="800" font-size="76" fill="url(#a)" letter-spacing="-1">
      M Talha Manzoor
    </text>
  </g>
  <text x="92" y="340" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="24" fill="#F0EEF8" opacity="0.85">
    Full-Stack Developer " Lahore, Pakistan
  </text>
  <text x="92" y="388" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="22" fill="#6B6B8A">
    Premium, performant web experiences  Next.js " React " MERN
  </text>

  <g transform="translate(92 450)">
    <rect width="140" height="44" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(201,168,76,0.25)"/>
    <text x="24" y="29" font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" fill="#C9A84C">TM</text>
  </g>
</svg>

